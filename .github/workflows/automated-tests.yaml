name: Automated Tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-unit:
    name: Test Unit
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: "pnpm"
          node-version-file: ".nvmrc"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Test Database
        env:
          PGPASSWORD: postgres
        run: createdb -h localhost -U postgres notchq_test

      - name: Run Migrations
        env:
          NODE_ENV: test
        run: pnpm run db:up

      - name: Test Unit
        env:
          NODE_ENV: test
        run: pnpm run test
