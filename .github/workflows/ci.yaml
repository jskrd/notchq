name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: "pnpm"
          node-version-file: ".nvmrc"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Upload node_modules
        uses: actions/upload-artifact@v6
        with:
          name: node-modules
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          retention-days: 1

  lint:
    name: Lint
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Download node_modules
        uses: actions/download-artifact@v6
        with:
          name: node-modules

      - name: Lint
        run: pnpm run lint

  format:
    name: Format
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Download node_modules
        uses: actions/download-artifact@v6
        with:
          name: node-modules

      - name: Format check
        run: pnpm run format:check

  typecheck:
    name: Typecheck
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Download node_modules
        uses: actions/download-artifact@v6
        with:
          name: node-modules

      - name: Typecheck
        run: pnpm run typecheck

  test:
    name: Test
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Download node_modules
        uses: actions/download-artifact@v6
        with:
          name: node-modules

      - name: Test
        run: pnpm run test
