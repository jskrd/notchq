version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    groups:
      all-dependencies:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /apps/api
    schedule:
      interval: daily
    groups:
      all-dependencies:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /apps/book
    schedule:
      interval: daily
    groups:
      all-dependencies:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /packages/db
    schedule:
      interval: daily
    groups:
      all-dependencies:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /packages/eslint-config
    schedule:
      interval: daily
    groups:
      all-dependencies:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /packages/typescript-config
    schedule:
      interval: daily
    groups:
      all-dependencies:
        patterns:
          - "*"
